name: Release

on:
  release:
    types:
      - published

  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build'
        required: true
        type: string
      prerelease:
        description: 'Prerelease build'
        required: true
        default: true
        type: boolean
      upload_to_release:
        description: 'Upload to releases'
        required: true
        default: true
        type: boolean

permissions:
  contents: write

env:
  FORGEJO_API_URL: https://git.disroot.org/api/v1
  FORGEJO_OWNER: Neo
  FORGEJO_REPO: neomovies-mobile

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      release_type: ${{ steps.meta.outputs.release_type }}
      upload_to_release: ${{ steps.meta.outputs.upload_to_release }}
    steps:
      - name: Resolve meta
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
            IS_PRERELEASE="${{ github.event.release.prerelease }}"
            UPLOAD_TO_RELEASE=true
          else
            TAG_NAME="${{ inputs.tag }}"
            IS_PRERELEASE="${{ inputs.prerelease }}"
            UPLOAD_TO_RELEASE="${{ inputs.upload_to_release }}"
          fi
          VERSION="${TAG_NAME#v}"
          RELEASE_TYPE="release"
          [[ "$IS_PRERELEASE" == "true" ]] && RELEASE_TYPE="prerelease"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "is_prerelease=$IS_PRERELEASE" >> $GITHUB_OUTPUT
          echo "release_type=$RELEASE_TYPE" >> $GITHUB_OUTPUT
          echo "upload_to_release=$UPLOAD_TO_RELEASE" >> $GITHUB_OUTPUT

  build-android:
    runs-on: ubuntu-latest
    needs: meta
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - run: pnpm install --frozen-lockfile

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Patch app.json releaseType
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            cfg.expo.extra = cfg.expo.extra || {};
            cfg.expo.extra.releaseType = '${{ needs.meta.outputs.release_type }}';
            fs.writeFileSync('app.json', JSON.stringify(cfg, null, 2));
          "

      - name: Setup keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "${KEYSTORE_BASE64:-}" ]; then exit 0; fi
          echo "$KEYSTORE_BASE64" | tr -d '\n\r ' | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "RELEASE_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> $GITHUB_ENV
          echo "RELEASE_KEYSTORE_PASSWORD=${{ secrets.RELEASE_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}" >> $GITHUB_ENV

      - name: Expo prebuild Android
        run: npx expo prebuild --platform android --no-install

      - run: chmod +x android/gradlew

      - name: Build APK
        env:
          CI: 'true'
          APP_VERSION: ${{ needs.meta.outputs.version }}
        working-directory: android
        run: ./gradlew :app:assembleRelease --build-cache --no-daemon

      - name: Rename APKs
        id: apk
        shell: bash
        run: |
          set -e
          VERSION="${{ needs.meta.outputs.version }}"
          RELEASE_TYPE="${{ needs.meta.outputs.release_type }}"
          IN_DIR="android/app/build/outputs/apk/release"
          OUT_DIR="$IN_DIR/renamed"
          mkdir -p "$OUT_DIR"
          for f in "$IN_DIR"/*.apk; do
            b="$(basename "$f")"
            if [[ "$b" == *"arm64-v8a"* ]]; then abi="arm64-v8a"
            elif [[ "$b" == *"armeabi-v7a"* ]]; then abi="armeabi-v7a"
            elif [[ "$b" == *"x86_64"* ]]; then abi="x86_64"
            else abi="universal"; fi
            cp -f "$f" "$OUT_DIR/neomovies-mobile-android-$RELEASE_TYPE-$VERSION-$abi.apk"
          done
          echo "dir=$OUT_DIR" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: apks-${{ needs.meta.outputs.release_type }}
          path: ${{ steps.apk.outputs.dir }}/*.apk

  build-ios:
    runs-on: macos-latest
    needs: meta
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - run: pnpm install --frozen-lockfile

      - name: Patch app.json releaseType
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            cfg.expo.extra = cfg.expo.extra || {};
            cfg.expo.extra.releaseType = '${{ needs.meta.outputs.release_type }}';
            fs.writeFileSync('app.json', JSON.stringify(cfg, null, 2));
          "

      - name: Expo prebuild iOS
        run: npx expo prebuild --platform ios --no-install

      - uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: ${{ runner.os }}-pods-

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - run: gem install xcpretty --no-document

      - name: Build unsigned .app
        env:
          APP_VERSION: ${{ needs.meta.outputs.version }}
        run: |
          xcodebuild -workspace ios/NeoMovies.xcworkspace \
            -scheme NeoMovies \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | xcpretty --color || (cat "$RUNNER_TEMP/DerivedData/Logs/Build/"*.xcactivitylog 2>/dev/null | gunzip -c 2>/dev/null | grep -E "error:|Build FAILED" | head -50; exit 1)

      - name: Package IPA
        id: ipa
        shell: bash
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          RELEASE_TYPE="${{ needs.meta.outputs.release_type }}"
          APP_PATH=$(find "$RUNNER_TEMP/DerivedData" -name "*.app" -not -path "*/iphoneos*simulator*" | grep -v "\.appex" | head -1)
          echo "Found .app: $APP_PATH"
          if [ -z "$APP_PATH" ]; then
            echo "All .app paths found:"; find "$RUNNER_TEMP/DerivedData" -name "*.app" | head -20; exit 1
          fi
          PAYLOAD_DIR="$RUNNER_TEMP/Payload"
          mkdir -p "$PAYLOAD_DIR/Payload"
          cp -r "$APP_PATH" "$PAYLOAD_DIR/Payload/"
          IPA_NAME="neomovies-mobile-ios-$RELEASE_TYPE-$VERSION.ipa"
          cd "$PAYLOAD_DIR" && zip -qr "$RUNNER_TEMP/$IPA_NAME" Payload
          echo "path=$RUNNER_TEMP/$IPA_NAME" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: ipa-${{ needs.meta.outputs.release_type }}
          path: ${{ steps.ipa.outputs.path }}

  publish:
    runs-on: ubuntu-latest
    needs: [meta, build-android, build-ios]
    if: ${{ needs.meta.outputs.upload_to_release == 'true' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: apks-${{ needs.meta.outputs.release_type }}
          path: dist/android

      - uses: actions/download-artifact@v4
        with:
          name: ipa-${{ needs.meta.outputs.release_type }}
          path: dist/ios

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag_name }}
          name: ${{ needs.meta.outputs.tag_name }}
          prerelease: ${{ needs.meta.outputs.is_prerelease }}
          files: |
            dist/android/*.apk
            dist/ios/*.ipa

      - name: Create or find Forgejo Release
        id: forgejo_release
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          TAG_NAME: ${{ needs.meta.outputs.tag_name }}
          IS_PRERELEASE: ${{ needs.meta.outputs.is_prerelease }}
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_URL="$FORGEJO_API_URL/repos/$FORGEJO_OWNER/$FORGEJO_REPO/releases/tags/$TAG_NAME"
          HTTP_CODE=$(curl -sS -o /tmp/forgejo-release.json -w "%{http_code}" \
            -H "Authorization: token $FORGEJO_TOKEN" "$RELEASE_URL")
          if [ "$HTTP_CODE" != "200" ]; then
            jq -n --arg tag "$TAG_NAME" --arg name "$TAG_NAME" --argjson prerelease "$IS_PRERELEASE" \
              '{tag_name: $tag, name: $name, body: "", draft: false, prerelease: $prerelease}' \
              > /tmp/forgejo-create-release.json
            curl -sS -f -X POST \
              -H "Authorization: token $FORGEJO_TOKEN" \
              -H "Content-Type: application/json" \
              "$FORGEJO_API_URL/repos/$FORGEJO_OWNER/$FORGEJO_REPO/releases" \
              --data @/tmp/forgejo-create-release.json > /tmp/forgejo-release.json
          fi
          RELEASE_ID=$(jq -r '.id' /tmp/forgejo-release.json)
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ]; then
            cat /tmp/forgejo-release.json; exit 1
          fi
          echo "id=$RELEASE_ID" >> $GITHUB_OUTPUT

      - name: Upload to Forgejo
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          RELEASE_ID: ${{ steps.forgejo_release.outputs.id }}
        shell: bash
        run: |
          set -euo pipefail
          for f in dist/android/*.apk dist/ios/*.ipa; do
            name="$(basename "$f")"
            echo "Uploading $name..."
            curl -sS -f -X POST \
              -H "Authorization: token $FORGEJO_TOKEN" \
              -F "attachment=@$f" \
              "$FORGEJO_API_URL/repos/$FORGEJO_OWNER/$FORGEJO_REPO/releases/$RELEASE_ID/assets?name=$name" \
              > /dev/null
          done
