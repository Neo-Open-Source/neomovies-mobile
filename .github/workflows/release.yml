name: Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - android
          - ios
      release_type:
        description: 'Release type'
        required: true
        default: 'prerelease'
        type: choice
        options:
          - prerelease
          - release

permissions:
  contents: read

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_type: ${{ steps.meta.outputs.release_type }}
      build_android: ${{ steps.meta.outputs.build_android }}
      build_ios: ${{ steps.meta.outputs.build_ios }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve meta
        id: meta
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")-$(git rev-parse --short HEAD)
          RELEASE_TYPE="${{ inputs.release_type }}"
          BUILD_ANDROID=$([[ "${{ inputs.platform }}" == "android" || "${{ inputs.platform }}" == "both" ]] && echo "true" || echo "false")
          BUILD_IOS=$([[ "${{ inputs.platform }}" == "ios" || "${{ inputs.platform }}" == "both" ]] && echo "true" || echo "false")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "release_type=$RELEASE_TYPE" >> $GITHUB_OUTPUT
          echo "build_android=$BUILD_ANDROID" >> $GITHUB_OUTPUT
          echo "build_ios=$BUILD_IOS" >> $GITHUB_OUTPUT

  build-android:
    runs-on: ubuntu-latest
    needs: meta
    if: ${{ needs.meta.outputs.build_android == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - run: pnpm install --frozen-lockfile

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Patch app.json releaseType
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            cfg.expo.extra = cfg.expo.extra || {};
            cfg.expo.extra.releaseType = '${{ needs.meta.outputs.release_type }}';
            fs.writeFileSync('app.json', JSON.stringify(cfg, null, 2));
          "

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        env:
          APP_VERSION: ${{ needs.meta.outputs.version }}
        run: eas build --platform android --profile preview --local --non-interactive --output ${{ github.workspace }}/app-release.apk

      - name: Rename APK
        id: apk
        shell: bash
        run: |
          VERSION="${{ needs.meta.outputs.version }}"
          RELEASE_TYPE="${{ needs.meta.outputs.release_type }}"
          NAME="neomovies-android-$RELEASE_TYPE-$VERSION.apk"
          mv "${{ github.workspace }}/app-release.apk" "${{ github.workspace }}/$NAME"
          echo "path=${{ github.workspace }}/$NAME" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.path }}
          retention-days: 7

  build-ios:
    runs-on: macos-latest
    needs: meta
    if: ${{ needs.meta.outputs.build_ios == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - run: pnpm install --frozen-lockfile

      - name: Patch app.json releaseType
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            cfg.expo.extra = cfg.expo.extra || {};
            cfg.expo.extra.releaseType = '${{ needs.meta.outputs.release_type }}';
            fs.writeFileSync('app.json', JSON.stringify(cfg, null, 2));
          "

      - name: Expo prebuild iOS
        run: npx expo prebuild --platform ios --no-install

      - uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: ${{ runner.os }}-pods-

      - name: Install CocoaPods
        working-directory: ios
        run: pod install

      - run: gem install xcpretty --no-document

      - name: Build unsigned .app
        env:
          APP_VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          xcodebuild \
            -workspace ios/NeoMovies.xcworkspace \
            -scheme NeoMovies \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            SWIFT_VERSION=5.9 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee "$RUNNER_TEMP/xcodebuild.log" | xcpretty --color
          if grep -q "BUILD FAILED" "$RUNNER_TEMP/xcodebuild.log"; then
            echo ""
            echo "=== BUILD FAILED — showing errors ==="
            grep -E "error:" "$RUNNER_TEMP/xcodebuild.log" | head -60
            exit 1
          fi

      - name: Package IPA
        id: ipa
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.meta.outputs.version }}"
          RELEASE_TYPE="${{ needs.meta.outputs.release_type }}"

          APP_PATH=$(find "$RUNNER_TEMP/DerivedData" -name "*.app" \
            -not -path "*simulator*" | grep -v "\.appex" | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "❌ .app not found. DerivedData contents:"
            find "$RUNNER_TEMP/DerivedData" -maxdepth 5 -type d | head -30 \
              || echo "(DerivedData directory missing entirely)"
            exit 1
          fi

          echo "✅ Found .app: $APP_PATH"
          PAYLOAD_DIR="$RUNNER_TEMP/Payload"
          mkdir -p "$PAYLOAD_DIR/Payload"
          cp -r "$APP_PATH" "$PAYLOAD_DIR/Payload/"
          IPA_NAME="neomovies-ios-$RELEASE_TYPE-$VERSION.ipa"
          cd "$PAYLOAD_DIR" && zip -qr "$RUNNER_TEMP/$IPA_NAME" Payload
          echo "path=$RUNNER_TEMP/$IPA_NAME" >> $GITHUB_OUTPUT
          echo "name=$IPA_NAME" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.ipa.outputs.name }}
          path: ${{ steps.ipa.outputs.path }}
          retention-days: 7
