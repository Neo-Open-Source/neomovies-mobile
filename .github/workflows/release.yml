name: Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - android
          - ios
      release_type:
        description: 'Release type'
        required: true
        default: 'prerelease'
        type: choice
        options:
          - prerelease
          - release

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: android
            runs-on: ubuntu-latest
          - platform: ios
            runs-on: macos-latest
    runs-on: ${{ matrix.runs-on }}
    if: |
      inputs.platform == 'all' ||
      inputs.platform == matrix.platform
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - run: pnpm install --frozen-lockfile

      - name: Patch app.json releaseType
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            cfg.expo.extra = cfg.expo.extra || {};
            cfg.expo.extra.releaseType = '${{ inputs.release_type }}';
            fs.writeFileSync('app.json', JSON.stringify(cfg, null, 2));
          "

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build ${{ matrix.platform }}
        run: |
          eas build \
            --platform ${{ matrix.platform }} \
            --profile preview \
            --local \
            --non-interactive \
            --output ./build.${{ matrix.platform == 'android' && 'apk' || 'tar.gz' }}

      - name: Rename artifact
        id: artifact
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          EXT=${{ matrix.platform == 'android' && 'apk' || 'tar.gz' }}
          NAME="neomovies-${{ matrix.platform }}-${{ inputs.release_type }}-${VERSION}-${SHORT_SHA}.${EXT}"
          mv ./build.${EXT} ./${NAME}
          echo "name=${NAME}" >> $GITHUB_OUTPUT
          echo "path=./${NAME}" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.path }}
          retention-days: 7
