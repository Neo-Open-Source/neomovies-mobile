name: Build

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - android
          - ios
      release_type:
        description: 'Release type'
        required: true
        default: 'prerelease'
        type: choice
        options:
          - prerelease
          - release

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    if: ${{ inputs.platform == 'all' || inputs.platform == 'android' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - run: pnpm install --frozen-lockfile

      - name: Patch app.json releaseType
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            cfg.expo.extra = cfg.expo.extra || {};
            cfg.expo.extra.releaseType = '${{ inputs.release_type }}';
            fs.writeFileSync('app.json', JSON.stringify(cfg, null, 2));
          "

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android
        run: eas build --platform android --profile preview --local --non-interactive --output ./build.apk

      - name: Rename artifact
        id: artifact
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          NAME="neomovies-android-${{ inputs.release_type }}-${VERSION}-${SHORT_SHA}.apk"
          mv ./build.apk ./${NAME}
          echo "name=${NAME}" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.name }}
          retention-days: 7

  build-ios:
    runs-on: macos-15
    if: ${{ inputs.platform == 'all' || inputs.platform == 'ios' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode 16.2 with iOS runtime
        run: |
          sudo xcode-select -s /Applications/Xcode_16.2.app
          xcodebuild -downloadPlatform iOS

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - run: pnpm install --frozen-lockfile

      - name: Patch app.json releaseType
        run: |
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('app.json', 'utf8'));
            cfg.expo.extra = cfg.expo.extra || {};
            cfg.expo.extra.releaseType = '${{ inputs.release_type }}';
            fs.writeFileSync('app.json', JSON.stringify(cfg, null, 2));
          "

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS (simulator)
        run: eas build --platform ios --profile preview --local --non-interactive --output ./build.tar.gz

      - name: Rename artifact
        id: artifact
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          NAME="neomovies-ios-${{ inputs.release_type }}-${VERSION}-${SHORT_SHA}.tar.gz"
          mv ./build.tar.gz ./${NAME}
          echo "name=${NAME}" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.name }}
          retention-days: 7
